<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">CORTEX // SYNC WIDGET</title>
    <style vid="5">
        :root {
            --bg-color: #030303;
            --grid-line: #1a1a1a;
            --text-main: #b0b0b0;
            --text-dim: #444;
            --text-high: #ffffff;
            --accent: #ffffff;
            --font-mono: 'Courier New', Courier, monospace;
            --control-h: 32px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 11px;
            overflow: hidden;
        }

        
        .widget-frame {
            background-color: var(--bg-color);
            border: 1px solid var(--grid-line);
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        
        .header {
            display: flex;
            border-bottom: 1px solid var(--grid-line);
            height: 30px;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-group {
            display: flex;
            gap: 24px;
        }

        .header-item span {
            color: var(--text-dim);
            margin-right: 8px;
        }

        .header-item b {
            color: var(--text-high);
            font-weight: 400;
        }

        
        .content {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 380px;
        }

        
        .matrix-panel {
            border-right: 1px solid var(--grid-line);
            display: flex;
            flex-direction: column;
        }

        .matrix-header {
            display: grid;
            grid-template-columns: 40px 1fr 40px;
            border-bottom: 1px solid var(--grid-line);
            height: 24px;
            align-items: center;
            text-align: center;
            color: var(--text-dim);
        }

        .matrix-grid {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            position: relative;
        }

        .matrix-row {
            display: grid;
            grid-template-columns: 40px 1fr 40px;
            height: 24px;
            align-items: center;
            border-bottom: 1px solid var(--grid-line);
            position: relative;
        }

        .matrix-row:last-child {
            border-bottom: none;
        }

        .row-idx {
            color: var(--text-dim);
            text-align: center;
            border-right: 1px solid var(--grid-line);
            height: 100%;
            line-height: 24px;
        }

        .row-data {
            padding-left: 12px;
            color: var(--text-main);
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        .row-meta {
            color: var(--text-dim);
            text-align: center;
            border-left: 1px solid var(--grid-line);
            height: 100%;
            line-height: 24px;
        }

        
        .scanner-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 24px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            transition: top 0.1s steps(1);
        }

        
        .control-panel {
            display: flex;
            flex-direction: column;
        }

        .section-label {
            padding: 8px 16px;
            color: var(--text-high);
            text-transform: uppercase;
            border-bottom: 1px solid var(--grid-line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-label svg {
            stroke: var(--text-high);
            width: 20px;
        }

        
        .param-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .param-cell {
            padding: 12px 16px;
            border-bottom: 1px solid var(--grid-line);
            border-right: 1px solid var(--grid-line);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .param-cell:nth-child(even) {
            border-right: none;
        }

        .param-header {
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .param-val {
            color: var(--text-high);
        }

        
        .slider-container {
            position: relative;
            height: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .slider-track {
            width: 100%;
            height: 1px;
            background: var(--text-dim);
            position: relative;
        }

        .slider-thumb {
            width: 10px;
            height: 10px;
            border: 1px solid var(--text-high);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider-thumb::after {
            content: '';
            width: 2px;
            height: 2px;
            background: var(--text-high);
            border-radius: 50%;
        }

        
        .graph-area {
            flex-grow: 1;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .graph-box {
            border: 1px solid var(--grid-line);
            position: relative;
            height: 100px;
            background: #050505;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .graph-label {
            position: absolute;
            top: 6px;
            left: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 10px;
        }

        
        .footer {
            border-top: 1px solid var(--grid-line);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        
        .footer-group span {
            margin-right: 16px;
        }

        
        .wave-selector {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .wave-opt {
            width: 20px;
            height: 12px;
            opacity: 0.3;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .wave-opt.active {
            opacity: 1;
        }
        
        .wave-opt svg {
            width: 100%;
            height: 100%;
            stroke: white;
            stroke-width: 1.5;
            fill: none;
        }

        
        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

    </style>
</head>
<body vid="6">

    <div class="widget-frame" vid="7">
        
        <div class="header" vid="8">
            <div class="header-group" vid="9">
                <div class="header-item" vid="10"><span vid="11">SYS</span> <b vid="12">NEURAL_ENG</b></div>
                <div class="header-item" vid="13"><span class="blink" vid="14">►</span> <b vid="15">RUNNING</b></div>
            </div>
            <div class="header-group" vid="16">
                <div class="header-item" vid="17"><span vid="18">CPU</span> <b vid="19">12%</b></div>
                <div class="header-item" vid="20"><span vid="21">MEM</span> <b vid="22">4.2GB</b></div>
            </div>
        </div>

        
        <div class="content" vid="23">
            
            <div class="matrix-panel" vid="24">
                <div class="matrix-header" vid="25">
                    <div vid="26">IDX</div>
                    <div style="text-align: left; padding-left: 12px;" vid="27">WEIGHT_HASH</div>
                    <div vid="28">ST</div>
                </div>
                <div class="matrix-grid" id="matrixContainer" vid="29">
                    
                    <div class="scanner-bar" id="scanner" vid="30"></div>
                </div>
            </div>

            
            <div class="control-panel" vid="31">
                <div class="section-label" vid="32">
                    <span vid="33">Hyperparameters</span>
                    <div class="wave-selector" vid="34">
                        <div class="wave-opt active" onclick="setWave(this)" vid="35">
                            <svg viewBox="0 0 20 12" vid="36"><path d="M0 12 C5 12, 5 0, 10 0 S 15 12, 20 12" vid="37"></path></svg>
                        </div>
                        <div class="wave-opt" onclick="setWave(this)" vid="38">
                            <svg viewBox="0 0 20 12" vid="39"><polyline points="0,12 5,12 5,0 15,0 15,12 20,12" vid="40"></polyline></svg>
                        </div>
                        <div class="wave-opt" onclick="setWave(this)" vid="41">
                            <svg viewBox="0 0 20 12" vid="42"><polyline points="0,12 10,0 20,12" vid="43"></polyline></svg>
                        </div>
                    </div>
                </div>

                <div class="param-grid" vid="44">
                    
                    <div class="param-cell" vid="45">
                        <div class="param-header" vid="46">
                            <span vid="47">L_RATE</span>
                            <span class="param-val" id="val1" vid="48">0.045</span>
                        </div>
                        <div class="slider-container" onmousedown="startDrag(event, 'val1', 0.001, 0.1, 3)" vid="49">
                            <div class="slider-track" vid="50"></div>
                            <div class="slider-thumb" style="left: 45%;" vid="51"></div>
                        </div>
                    </div>
                    
                    <div class="param-cell" vid="52">
                        <div class="param-header" vid="53">
                            <span vid="54">DECAY</span>
                            <span class="param-val" id="val2" vid="55">0.92</span>
                        </div>
                        <div class="slider-container" onmousedown="startDrag(event, 'val2', 0.1, 1.0, 2)" vid="56">
                            <div class="slider-track" vid="57"></div>
                            <div class="slider-thumb" style="left: 92%;" vid="58"></div>
                        </div>
                    </div>
                     
                     <div class="param-cell" vid="59">
                        <div class="param-header" vid="60">
                            <span vid="61">MOMTM</span>
                            <span class="param-val" id="val3" vid="62">128</span>
                        </div>
                        <div class="slider-container" onmousedown="startDrag(event, 'val3', 0, 255, 0)" vid="63">
                            <div class="slider-track" vid="64"></div>
                            <div class="slider-thumb" style="left: 50%;" vid="65"></div>
                        </div>
                    </div>
                     
                     <div class="param-cell" vid="66">
                        <div class="param-header" vid="67">
                            <span vid="68">BATCH</span>
                            <span class="param-val" id="val4" vid="69">64</span>
                        </div>
                        <div class="slider-container" onmousedown="startDrag(event, 'val4', 16, 128, 0)" vid="70">
                            <div class="slider-track" vid="71"></div>
                            <div class="slider-thumb" style="left: 30%;" vid="72"></div>
                        </div>
                    </div>
                </div>

                <div class="section-label" vid="73">
                    <span vid="74">Performance Metrics</span>
                    <span vid="75">FLT.32</span>
                </div>

                <div class="graph-area" vid="76">
                    <div class="graph-box" vid="77">
                        <span class="graph-label" vid="78">LOSS_FUNC</span>
                        <canvas id="canvasLoss" vid="79"></canvas>
                    </div>
                    <div class="graph-box" vid="80">
                        <span class="graph-label" vid="81">ACCURACY</span>
                        <canvas id="canvasAcc" vid="82"></canvas>
                    </div>
                </div>
            </div>
        </div>

        
        <div class="footer" vid="83">
            <div class="footer-group" vid="84">
                <span vid="85">LOG_OUT: OPTIMIZER CONVERGING</span>
            </div>
            <div class="footer-group" vid="86">
                <span vid="87">.py</span> <span vid="88">.json</span> <span vid="89">.chk</span>
            </div>
        </div>
    </div>

    <script vid="90">
        
        const matrixContainer = document.getElementById('matrixContainer');
        const scanner = document.getElementById('scanner');
        const rowCount = 14;
        
        function generateHex() {
            return '0x' + Math.floor(Math.random()*16777215).toString(16).toUpperCase().padStart(6, '0');
        }

        
        for(let i=0; i<rowCount; i++) {
            const row = document.createElement('div');
            row.className = 'matrix-row';
            row.innerHTML = `
                <div class="row-idx">${i.toString(16).toUpperCase().padStart(2, '0')}</div>
                <div class="row-data" id="data-${i}">-- -- -- --</div>
                <div class="row-meta">:</div>
            `;
            matrixContainer.appendChild(row);
        }
        
        matrixContainer.appendChild(scanner);

        let currentRow = 0;
        
        function updateMatrix() {
            
            scanner.style.top = `${currentRow * 24}px`;
            
            
            const dataEl = document.getElementById(`data-${currentRow}`);
            const val1 = generateHex().substring(0, 4);
            const val2 = generateHex().substring(0, 4);
            dataEl.innerText = `${val1} ${val2} [ACT]`;
            dataEl.style.color = '#fff';

            
            const prevRow = currentRow === 0 ? rowCount - 1 : currentRow - 1;
            const prevEl = document.getElementById(`data-${prevRow}`);
            prevEl.style.color = '#b0b0b0';

            currentRow = (currentRow + 1) % rowCount;
        }

        setInterval(updateMatrix, 120); 

        
        function initGraph(canvasId, color, speed) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let data = new Array(50).fill(0.5);
            let time = 0;

            function resize() {
                canvas.width = canvas.parentElement.offsetWidth;
                canvas.height = canvas.parentElement.offsetHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function draw() {
                
                time += speed;
                const noise = (Math.random() - 0.5) * 0.1;
                const trend = Math.sin(time) * 0.3 + 0.5;
                const newVal = Math.max(0.1, Math.min(0.9, trend + noise));
                
                data.push(newVal);
                data.shift();

                
                ctx.fillStyle = '#050505';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, canvas.height/2);
                ctx.lineTo(canvas.width, canvas.height/2);
                ctx.stroke();

                
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                const step = canvas.width / (data.length - 1);
                
                for(let i=0; i<data.length; i++) {
                    const x = i * step;
                    const y = canvas.height - (data[i] * canvas.height);
                    if(i===0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                
                const lastX = canvas.width;
                const lastY = canvas.height - (data[data.length-1] * canvas.height);
                ctx.beginPath();
                ctx.arc(lastX - 2, lastY, 2, 0, Math.PI * 2);
                ctx.fillStyle = color; 
                ctx.fill();

                requestAnimationFrame(draw);
            }
            draw();
        }

        initGraph('canvasLoss', '#ffffff', 0.05);
        initGraph('canvasAcc', '#ffffff', 0.02);

        
        function setWave(el) {
            document.querySelectorAll('.wave-opt').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function startDrag(e, valId, min, max, precision) {
            const container = e.currentTarget;
            const thumb = container.querySelector('.slider-thumb');
            const output = document.getElementById(valId);
            
            function onMove(moveEvent) {
                const rect = container.getBoundingClientRect();
                let x = moveEvent.clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width));
                const pct = x / rect.width;
                
                thumb.style.left = `${pct * 100}%`;
                
                const val = min + (pct * (max - min));
                output.innerText = val.toFixed(precision);
            }
            
            function onUp() {
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            }

            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
            onMove(e); 
        }

    </script>

</body></html>
